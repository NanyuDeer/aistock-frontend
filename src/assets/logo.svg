<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="400" height="400" fill="#0d1117" rx="20" ry="20"/>
  
  <!-- 网格线 -->
  <g stroke="#2a3343" stroke-width="1">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>
  
  <!-- 股票走势图 -->
  <path d="M40,320 L60,280 L80,300 L100,270 L120,290 L140,260 L160,220 L180,250 L200,180 L220,230 L240,210 L260,160 L280,180 L300,120 L320,100 L340,80 L360,60" 
        fill="none" stroke="#1e90ff" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- 中央亮点 -->
  <circle cx="200" cy="180" r="8" fill="#40c4ff">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- AI连接线 -->
  <line x1="200" y1="0" x2="200" y2="350" stroke="#1e90ff" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- 装饰元素 - 数据点 -->
  <g fill="#40c4ff" opacity="0.6">
    <circle cx="60" cy="280" r="3"/>
    <circle cx="100" cy="270" r="3"/>
    <circle cx="140" cy="260" r="3"/>
    <circle cx="180" cy="250" r="3"/>
    <circle cx="220" cy="230" r="3"/>
    <circle cx="260" cy="160" r="3"/>
    <circle cx="300" cy="120" r="3"/>
    <circle cx="340" cy="80" r="3"/>
  </g>
  
  <!-- Logo文字 - 智能定位 -->
  <g font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">
    <text x="200" y="370" font-size="28" fill="#ffffff">AI STOCK LINK</text>
    <text x="200" y="390" font-size="14" fill="#1e90ff">AI-Powered Stock Analysis</text>
  </g>
</svg>